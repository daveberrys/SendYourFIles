name: Release Litemark (New Version)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
      prerelease:
        description: 'Mark as prerelease?'
        type: boolean
        default: false

permissions:
  contents: write

env:
  pythonVersion: 3.13.11

jobs:
  build:
    name: Build for ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
        fail-fast: false
        matrix:
            include:
              - os: ubuntu-latest
                os-name: Linux Ubuntu
                artifact-path: dist/SendYourFiles-Linux
                artifact-name: SendYourFiles-Linux
              - os: windows-latest
                os-name: Windows
                artifact-path: dist/SendYourFiles-Windows.exe
                artifact-name: SendYourFiles-Windows
              - os: macos-latest
                os-name: MacOS
                artifact-path: dist/SendYourFiles-MacOS
                artifact-name: SendYourFiles-MacOS
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Python ${{ env.pythonVersion }}
          uses: actions/setup-python@v4
          with:
            python-version: ${{ env.pythonVersion }}

        - name: Install Extra System Dependencies (Linux)
          if: runner.os == 'Linux'
          run: |
            sudo apt update
            sudo apt install -y \
              build-essential \
              pkg-config \
              python3-dev \
              libcairo2-dev \
              libgirepository1.0-dev \
              libwebkit2gtk-4.1-dev \
              libgtk-3-dev \
              gir1.2-gtk-3.0 \
              gir1.2-webkit2-4.1 \
              libayatana-appindicator3-dev \
              gir1.2-ayatanaappindicator3-0.1 \
              dbus \
              libdbus-1-dev \
              gir1.2-dbusmenu-gtk3-0.4 \
              gir1.2-dbus-1.0

        - name: Install Python dependencies
          run: pip install -r requirements.txt

        - name: Compile with PyInstaller
          run: pyinstaller build.spec

        - name: Rename Build (Windows)
          if: runner.os == 'Windows'
          run: move dist\SendYourFiles.exe ${{ matrix.artifact-path }}

        - name: Rename Build (Linux/macOS)
          if: runner.os != 'Windows'
          run: mv dist/SendYourFiles ${{ matrix.artifact-path }}

        - name: Upload Build Artifact
          uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.artifact-name }}
            path: ${{ matrix.artifact-path }}

  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate commit list
        id: commits
        run: |
          git fetch --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          echo "COMMITS<<END" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "END" >> $GITHUB_OUTPUT

      - name: Create Git Tag (if not exists)
        run: |
          git fetch --tags
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag already exists owo"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag -a ${{ inputs.version }} -m "Release ${{ inputs.version }}"
            git push origin ${{ inputs.version }}
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          name: 'LiteMark ${{ inputs.version }}'
          body: |
            # LiteMark version ${{ inputs.version }}!!!

            Check out the summarized updates in [CHANGELOG.md](https://github.com/PinpointTools/LiteMark/blob/main/CHANGELOG.md)

            ---

            ## Commits
            ${{ steps.commits.outputs.COMMITS }}
          files: dist/**